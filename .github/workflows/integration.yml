name: Integration

on:
  pull_request:
    paths:
      - "cloud/**"
      - "tests/integration/**"
      - ".github/workflows/integration.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 2"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  localstack-s3:
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      localstack:
        # Keep this pinned: recent `latest` images can require a LocalStack auth token.
        image: localstack/localstack:3.8.1
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[aws,dev]'
      - run: pytest tests/integration/test_aws_localstack_s3.py
        env:
          LOCALSTACK_ENDPOINT: http://localhost:4566
          AWS_DEFAULT_REGION: us-east-1
