name: K8s Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * 3"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  kind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: helm/kind-action@v1
        with:
          cluster_name: ah-test
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[k8s,dev]'
      - name: Run K8s audit against kind cluster
        run: |
          pagerwesi k8s --format json --output reports/k8s.json
          cat reports/k8s.json
      - name: Verify findings structure
        run: |
          python -c "
          import json, sys
          data = json.load(open('reports/k8s.json'))
          assert 'findings' in data
          assert 'summary' in data
          print(f\"Controls checked: {len(data['findings'])}\")
          sys.exit(0)
          "
