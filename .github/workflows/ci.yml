name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest --cov=cloud --cov-report=term-missing
      - run: python -m compileall -q cloud tests

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck linux/harden.sh macos/harden.sh
      - run: bash -n linux/harden.sh macos/harden.sh

  linux-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit mode does not mutate the runner
        run: |
          set +e
          output=$(bash linux/harden.sh --mode audit 2>&1)
          status=$?
          set -e
          printf '%s\n' "$output"
          test "$status" -eq 0 -o "$status" -eq 1
          grep -Eq '\[(PASS|FAIL|SKIP)\]' <<<"$output"
      - name: Plan mode emits planned commands
        run: |
          set +e
          output=$(sudo bash linux/harden.sh --mode plan 2>&1)
          status=$?
          set -e
          printf '%s\n' "$output"
          test "$status" -eq 0 -o "$status" -eq 1
          grep -q '\[PLAN\]' <<<"$output"

  powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse PowerShell script
        shell: pwsh
        run: |
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/windows/harden.ps1", [ref]$null, [ref]$errors
          )
          if ($errors) { $errors | Format-List; exit 1 }

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pip-audit
      - run: pip-audit -r requirements.lock
