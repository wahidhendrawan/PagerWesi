name: CI

on:
  push:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.lock
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[aws,azure,gcp,k8s,dev]'
      - run: ruff check .
      - run: mypy cloud
      - run: python scripts/generate_control_docs.py
      - run: git diff --exit-code docs/controls.md docs/compliance-mapping.json
      - name: Test with coverage (Python 3.12)
        if: matrix.python-version == '3.12'
        run: pytest --cov=cloud --cov-report=term-missing --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
      - name: Test without coverage (other versions)
        if: matrix.python-version != '3.12'
        run: pytest
      - run: python -m compileall -q cloud tests

  sarif:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[aws,azure,gcp,k8s,dev]'
      - name: Generate SARIF from dry-run audit
        run: |
          python -c "
          from cloud.core import render_sarif, Finding, Status, Severity
          from cloud.control_registry import CONTROL_METADATA
          from io import StringIO
          import json, pathlib
          findings = [
              Finding(cid, meta.intent, Status.PASS, Severity.INFO, meta.target, 'CI baseline')
              for cid, meta in CONTROL_METADATA.items()
          ]
          s = StringIO()
          render_sarif(findings, s)
          pathlib.Path('reports').mkdir(exist_ok=True)
          pathlib.Path('reports/baseline.sarif').write_text(s.getvalue())
          "
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/baseline.sarif
          category: pagerwesi

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y bats shellcheck
      - run: shellcheck linux/harden.sh macos/harden.sh freebsd/harden.sh alpine/harden.sh
      - run: sh -n freebsd/harden.sh alpine/harden.sh
      - run: bash -n linux/harden.sh macos/harden.sh
      - run: bats tests/os/linux_harden.bats
      - run: bats tests/os/freebsd_harden.bats
      - run: bats tests/os/alpine_harden.bats

  linux-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Audit mode does not mutate the runner
        run: |
          set +e
          output=$(bash linux/harden.sh --mode audit 2>&1)
          status=$?
          set -e
          printf '%s\n' "$output"
          test "$status" -eq 0 -o "$status" -eq 1
          grep -Eq '\[(PASS|FAIL|SKIP)\]' <<<"$output"
      - name: Plan mode emits planned commands
        run: |
          set +e
          output=$(sudo bash linux/harden.sh --mode plan 2>&1)
          status=$?
          set -e
          printf '%s\n' "$output"
          test "$status" -eq 0 -o "$status" -eq 1
          grep -q '\[PLAN\]' <<<"$output"

  powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Parse PowerShell script
        shell: pwsh
        run: |
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/windows/harden.ps1", [ref]$null, [ref]$errors
          )
          if ($errors) { $errors | Format-List; exit 1 }
      - name: Run Pester contract tests
        shell: pwsh
        run: Invoke-Pester -Path tests/os/windows_harden.Tests.ps1 -CI

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pip-audit
      - run: pip-audit -r requirements.lock
